<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Walk</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Arka plana Unsplash'ten yüksek kaliteli bir sokak çekimi ekledim */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .container {
            /* Çerçeveyi ve gri arka planı kaldırdık, sadece içeriği merkeze aldık */
            max-width: 450px;
            width: 90%;
        }

        .logo {
            width: 220px; /* Logoyu biraz daha belirgin yaptık */
            margin-bottom: 40px;
            /* Hafif bir gölge ile logonun her zeminde okunmasını sağladık */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.15); /* Daha şeffaf ve cam efekti */
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px); /* Arka planı hafifçe flulaştırarak şıklık katar */
        }

        .btn:hover {
            background: rgba(255, 255, 255, 1);
            color: black;
            transform: scale(1.03);
        }

        .counter-box {
            margin-top: 50px;
            padding-top: 20px;
        }

        #step-text {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            font-weight: 300;
        }

        #step-number {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <img src="vague_logo_1.png" alt="Vague Walk" class="logo">

        <!-- Sosyal Medya -->
        <div class="links">
            <a href="https://youtube.com/@vaguewalkcom" target="_blank" class="btn">YouTube</a>
            <a href="https://www.instagram.com/vaguewalkcom" target="_blank" class="btn">Instagram</a>
            <a href="https://www.tiktok.com/@vaguewalkcom" target="_blank" class="btn">TikTok</a>
            <a href="https://pin.it/LIjjJITcK" target="_blank" class="btn">Pinterest</a>
            <a href="https://x.com/vaguewalkcom" target="_blank" class="btn">X (Twitter)</a>
        </div>

        <!-- Adım Sayacı -->
        <div class="counter-box">
            <p id="step-text"></p>
            <p id="step-number">0</p>
        </div>
    </div>

    <script>
        const targetSteps = 125450; 
        const duration = 2500; 

        const messages = {
            'tr': 'Video çekimleri için atılan toplam adım',
            'en': 'Total steps taken for video shoots',
            'de': 'Gesamtschritte für Videoaufnahmen',
            'fr': 'Pas totaux pour les tournages vidéo'
        };

        const userLang = navigator.language.split('-')[0];
        document.getElementById('step-text').innerText = messages[userLang] || messages['en'];

        const stepElement = document.getElementById('step-number');
        let startTime = null;

        function animateSteps(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const currentSteps = Math.floor(easeOut * targetSteps);
            
            stepElement.innerText = currentSteps.toLocaleString(userLang === 'tr' ? 'tr-TR' : 'en-US');
            
            if (progress < 1) {
                window.requestAnimationFrame(animateSteps);
            }
        }
        window.requestAnimationFrame(animateSteps);
    </script>
</body>
</html>
