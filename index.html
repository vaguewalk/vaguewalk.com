<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Walk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* BURASI KRİTİK: Senin yüklediğin resmi çağırıyoruz, dış link yok! */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('./vague_background_1.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            max-width: 500px;
            width: 90%;
        }

        .logo {
            width: 340px; 
            max-width: 80%;
            margin-bottom: 40px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            font-weight: 300;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        .counter-box {
            margin-top: 50px;
        }

        #step-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* İSTEDİĞİN İNCE PUNTO */
            font-weight: 200; 
        }

        #step-number {
            /* İSTEDİĞİN ULTRA İNCE PUNTO */
            font-weight: 100; 
            font-size: 4rem;
            margin: 0;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <img src="vague_logo_1.png" alt="Vague Walk" class="logo">

        <div class="links">
            <a href="https://youtube.com/@vaguewalkcom" target="_blank" class="btn">YOUTUBE</a>
            <a href="https://www.instagram.com/vaguewalkcom" target="_blank" class="btn">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@vaguewalkcom" target="_blank" class="btn">TIKTOK</a>
            <a href="https://pin.it/LIjjJITcK" target="_blank" class="btn">PINTEREST</a>
            <a href="https://x.com/vaguewalkcom" target="_blank" class="btn">X (TWITTER)</a>
        </div>

        <div class="counter-box">
            <p id="step-text"></p>
            <p id="step-number">0</p>
        </div>
    </div>

    <script>
        const targetSteps = 18000; 
        const duration = 2500; 
        const translations = {
            'tr': 'VİDEO ÇEKİMLERİ İÇİN ATILAN TOPLAM ADIM',
            'en': 'TOTAL STEPS TAKEN FOR VIDEO SHOOTS',
            'de': 'GESAMTSCHRITTE FÜR VIDEOAUFNAHMEN'
        };

        const userLang = navigator.language.split('-')[0];
        document.getElementById('step-text').innerText = translations[userLang] || translations['en'];

        const stepElement = document.getElementById('step-number');
        let startTime = null;

        function animateSteps(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            const currentSteps = Math.floor(easeOut * targetSteps);
            stepElement.innerText = currentSteps.toLocaleString(userLang === 'tr' ? 'tr-TR' : 'en-US');
            if (progress < 1) window.requestAnimationFrame(animateSteps);
        }
        window.requestAnimationFrame(animateSteps);
    </script>
</body>
</html>
