<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Walk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        /* Arka Plan Görseli */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Belirttiğin dosya ismini buraya tanımladık */
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), 
                        url('vague_background_1.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .container {
            max-width: 500px;
            width: 90%;
            z-index: 1;
        }

        .logo {
            width: 360px; 
            max-width: 85%;
            margin-bottom: 40px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            font-weight: 400;
            letter-spacing: 1.5px;
            backdrop-filter: blur(8px);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .counter-box {
            margin-top: 55px;
        }

        #step-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.85);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 200; /* İnce punto */
        }

        #step-number {
            /* İstediğin ultra-ince punto */
            font-weight: 100; 
            font-size: 4rem;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <!-- Büyük Logo -->
        <img src="vague_logo_1.png" alt="Vague Walk" class="logo">

        <!-- Sosyal Linkler -->
        <div class="links">
            <a href="https://youtube.com/@vaguewalkcom" target="_blank" class="btn">YOUTUBE</a>
            <a href="https://www.instagram.com/vaguewalkcom" target="_blank" class="btn">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@vaguewalkcom" target="_blank" class="btn">TIKTOK</a>
            <a href="https://pin.it/LIjjJITcK" target="_blank" class="btn">PINTEREST</a>
            <a href="https://x.com/vaguewalkcom" target="_blank" class="btn">X (TWITTER)</a>
        </div>

        <!-- 18.000 İnce Sayaç -->
        <div class="counter-box">
            <p id="step-text"></p>
            <p id="step-number">0</p>
        </div>
    </div>

    <script>
        const targetSteps = 18000; 
        const duration = 2500; 

        const translations = {
            'tr': 'VİDEO ÇEKİMLERİ İÇİN ATILAN TOPLAM ADIM',
            'en': 'TOTAL STEPS TAKEN FOR VIDEO SHOOTS',
            'de': 'GESAMTSCHRITTE FÜR VIDEOAUFNAHMEN'
        };

        const userLang = navigator.language.split('-')[0];
        document.getElementById('step-text').innerText = translations[userLang] || translations['en'];

        const stepElement = document.getElementById('step-number');
        let startTime = null;

        function animateSteps(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            const currentSteps = Math.floor(easeOut * targetSteps);
            
            stepElement.innerText = currentSteps.toLocaleString(userLang === 'tr' ? 'tr-TR' : 'en-US');
            
            if (progress < 1) {
                window.requestAnimationFrame(animateSteps);
            }
        }
        window.requestAnimationFrame(animateSteps);
    </script>
</body>
</html>
