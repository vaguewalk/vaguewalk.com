<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Walk</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Arka planı doğrudan body'e değil, bir katmana veriyoruz ki yüklenmesi garantilensin */
            background: #222; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Attığın gece/ışık izli görsele en yakın yüksek kalite street görseli */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1445019980597-93fa8acb246c?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            max-width: 500px;
            width: 90%;
            z-index: 1;
        }

        .logo {
            /* Logoyu iyice büyüttük, senin örnekteki gibi çok baskın */
            width: 320px; 
            max-width: 80%;
            margin-bottom: 50px;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.7));
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            letter-spacing: 1.5px;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            font-size: 1rem;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .counter-box {
            margin-top: 60px;
        }

        #step-text {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #step-number {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <!-- Logo -->
        <img src="vague_logo_1.png" alt="Vague Walk" class="logo">

        <!-- Butonlar -->
        <div class="links">
            <a href="https://youtube.com/@vaguewalkcom" target="_blank" class="btn">YOUTUBE</a>
            <a href="https://www.instagram.com/vaguewalkcom" target="_blank" class="btn">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@vaguewalkcom" target="_blank" class="btn">TIKTOK</a>
            <a href="https://pin.it/LIjjJITcK" target="_blank" class="btn">PINTEREST</a>
            <a href="https://x.com/vaguewalkcom" target="_blank" class="btn">X (TWITTER)</a>
        </div>

        <!-- Adım Sayacı -->
        <div class="counter-box">
            <p id="step-text"></p>
            <p id="step-number">0</p>
        </div>
    </div>

    <script>
        const targetSteps = 18000; 
        const duration = 3000; 

        const translations = {
            'tr': 'VİDEO ÇEKİMLERİ İÇİN ATILAN TOPLAM ADIM',
            'en': 'TOTAL STEPS TAKEN FOR VIDEO SHOOTS',
            'de': 'GESAMTSCHRITTE FÜR VIDEOAUFNAHMEN',
            'fr': 'NOMBRE TOTAL DE PAS EFFECTUÉS POUR LES TOURNAGES'
        };

        const userLang = navigator.language.split('-')[0];
        document.getElementById('step-text').innerText = translations[userLang] || translations['en'];

        const stepElement = document.getElementById('step-number');
        let startTime = null;

        function animateSteps(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            const currentSteps = Math.floor(easeOut * targetSteps);
            
            stepElement.innerText = currentSteps.toLocaleString(userLang === 'tr' ? 'tr-TR' : 'en-US');
            
            if (progress < 1) {
                window.requestAnimationFrame(animateSteps);
            }
        }
        window.requestAnimationFrame(animateSteps);
    </script>
</body>
</html>
