<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Walk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        /* Video Arka Plan Ayarları */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover; /* Videoyu ekranı kaplayacak şekilde yayar */
        }

        /* Karartma Perdesi (Logonun ve butonların okunması için) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .container {
            max-width: 500px;
            width: 90%;
            z-index: 1;
        }

        .logo {
            /* Senin istediğin gibi devasa logo */
            width: 380px; 
            max-width: 85%;
            margin-bottom: 35px;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.8));
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            font-weight: 700;
            letter-spacing: 1.5px;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .counter-box {
            margin-top: 50px;
        }

        #step-text {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #step-number {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <!-- Arka Plan Videosu -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="vague_backgroundvideo_1.mp4" type="video/mp4">
    </video>

    <!-- Karartma Katmanı -->
    <div class="overlay"></div>

    <div class="container">
        <!-- Logo -->
        <img src="vague_logo_1.png" alt="Vague Walk" class="logo">

        <!-- Sosyal Linkler -->
        <div class="links">
            <a href="https://youtube.com/@vaguewalkcom" target="_blank" class="btn">YOUTUBE</a>
            <a href="https://www.instagram.com/vaguewalkcom" target="_blank" class="btn">INSTAGRAM</a>
            <a href="https://www.tiktok.com/@vaguewalkcom" target="_blank" class="btn">TIKTOK</a>
            <a href="https://pin.it/LIjjJITcK" target="_blank" class="btn">PINTEREST</a>
            <a href="https://x.com/vaguewalkcom" target="_blank" class="btn">X (TWITTER)</a>
        </div>

        <!-- 18.000 Adım Sayacı -->
        <div class="counter-box">
            <p id="step-text"></p>
            <p id="step-number">0</p>
        </div>
    </div>

    <script>
        const targetSteps = 18000; 
        const duration = 2500; 

        const translations = {
            'tr': 'VİDEO ÇEKİMLERİ İÇİN ATILAN TOPLAM ADIM',
            'en': 'TOTAL STEPS TAKEN FOR VIDEO SHOOTS',
            'de': 'GESAMTSCHRITTE FÜR VIDEOAUFNAHMEN',
            'fr': 'NOMBRE TOTAL DE PAS EFFECTUÉS POUR LES TOURNAGES'
        };

        const userLang = navigator.language.split('-')[0];
        document.getElementById('step-text').innerText = translations[userLang] || translations['en'];

        const stepElement = document.getElementById('step-number');
        let startTime = null;

        function animateSteps(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            const currentSteps = Math.floor(easeOut * targetSteps);
            
            stepElement.innerText = currentSteps.toLocaleString(userLang === 'tr' ? 'tr-TR' : 'en-US');
            
            if (progress < 1) {
                window.requestAnimationFrame(animateSteps);
            }
        }
        window.requestAnimationFrame(animateSteps);
    </script>
</body>
</html>
